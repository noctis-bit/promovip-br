<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin | PromoVIPBR</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --red: #E50914;
            --red-dark: #B2060F;
            --dark: #0D0D0D;
            --dark2: #1A1A1A;
            --dark3: #242424;
            --gray: #888;
            --white: #FFFFFF;
            --font-display: 'Barlow Condensed', sans-serif;
            --font-body: 'Barlow', sans-serif;
        }

        body {
            background: var(--dark);
            color: var(--white);
            font-family: var(--font-body);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        .admin-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 40px;
            background: var(--dark2);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .admin-header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .admin-header h1 {
            font-family: var(--font-display);
            font-weight: 900;
            font-size: 42px;
            text-transform: uppercase;
            letter-spacing: -0.01em;
            margin-bottom: 8px;
        }

        .admin-header h1 span { color: var(--red); }
        .admin-header p { color: var(--gray); font-size: 16px; }

        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 24px;
            background: var(--dark3);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--gray);
            border-radius: 8px;
            font-family: var(--font-display);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tab-btn:hover { color: var(--white); border-color: var(--red); }
        .tab-btn.active { background: var(--red); color: var(--white); border-color: var(--red); }

        .admin-section {
            background: var(--dark3);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 24px;
        }

        .admin-section h2 {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 24px;
            text-transform: uppercase;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            color: var(--gray);
            letter-spacing: 0.05em;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: var(--dark);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: var(--white);
            font-family: var(--font-body);
            font-size: 16px;
            transition: border-color 0.2s;
        }

        .form-group input:focus { outline: none; border-color: var(--red); }

        .upload-area {
            border: 2px dashed rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 12px;
            background: rgba(255,255,255,0.02);
            cursor: pointer;
            text-align: center;
            transition: all 0.2s ease;
            margin-bottom: 20px;
        }

        .upload-area:hover { border-color: var(--red); background: rgba(229,9,20,0.05); }
        .upload-area p { font-weight: 600; color: var(--gray); }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: var(--red);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .btn-submit:hover { background: #FF3B3B; transform: translateY(-2px); }

        .list-container {
            margin-top: 20px;
            max-height: 500px;
            overflow-y: auto;
            padding-right: 8px;
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: var(--dark);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 10px;
            margin-bottom: 12px;
            transition: border-color 0.2s;
        }

        .item-row:hover { border-color: rgba(229,9,20,0.3); }

        .item-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .item-thumb {
            width: 60px;
            height: 60px;
            object-fit: contain;
            background: white;
            padding: 5px;
            border-radius: 8px;
        }

        .item-text strong {
            display: block;
            font-family: var(--font-display);
            font-size: 18px;
            margin-bottom: 2px;
        }

        .item-text small { color: var(--red); font-weight: 700; font-size: 14px; }

        .btn-group { display: flex; gap: 8px; }

        .btn-action {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-family: var(--font-display);
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            font-size: 13px;
        }

        .btn-edit { background: #3498db; color: white; }
        .btn-delete { background: var(--red); color: white; }

        .loading-spinner {
            display: none;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid var(--red);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: var(--dark2);
            padding: 40px;
            border-radius: 16px;
            width: 90%;
            max-width: 500px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .modal-content h3 {
            font-family: var(--font-display);
            font-weight: 900;
            font-size: 28px;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        .footer-link {
            text-align: center;
            margin-top: 30px;
        }
        .footer-link a { color: var(--gray); font-size: 14px; text-transform: uppercase; font-weight: 700; letter-spacing: 0.1em; }
        .footer-link a:hover { color: var(--red); }
    </style>
    <!-- SUPABASE SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="admin-container">
        <header class="admin-header">
            <h1>Painel <span>Admin</span></h1>
            <p>Gerenciamento de promoções, cupons e automações.</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('automation')">Automação PDF</button>
            <button class="tab-btn" onclick="showTab('products')">Anúncios Ativos</button>
            <button class="tab-btn" onclick="showTab('coupons')">Cupons</button>
        </div>

        <!-- TAB: AUTOMAÇÃO PDF -->
        <div id="tab-automation" class="tab-content">
            <div class="admin-section">
                <h2>📄 Envio de PDF</h2>
                <p style="color: var(--gray); font-size: 14px; margin-bottom: 20px;">Envie o PDF promocional para extração automática de dados e imagens.</p>
                <form id="uploadForm">
                    <div class="upload-area" onclick="document.getElementById('pdfFile').click()">
                        <p id="fileName">Clique para selecionar o PDF</p>
                        <input type="file" id="pdfFile" accept=".pdf" style="display: none" onchange="updateFileName()">
                    </div>
                    <div class="form-group">
                        <label for="globalCoupon">Cupom Padrão (opcional)</label>
                        <input type="text" id="globalCoupon" placeholder="Ex: PROMO10">
                    </div>
                    <button type="submit" class="btn-submit">Processar PDF agora</button>
                </form>
                <div class="loading-spinner" id="spinner"></div>
                <div id="status" style="text-align:center; margin-top:15px; font-weight:700;"></div>
            </div>
        </div>

        <!-- TAB: ANÚNCIOS ATIVOS -->
        <div id="tab-products" class="tab-content" style="display: none">
            <div class="admin-section">
                <h2>🛍️ Gerenciar Anúncios</h2>
                <div class="list-container" id="productList">
                    <!-- Carregado via JS -->
                </div>
            </div>
        </div>

        <!-- TAB: CUPONS -->
        <div id="tab-coupons" class="tab-content" style="display: none">
            <div class="admin-section">
                <h2>🏷️ Novo Cupom</h2>
                <form id="couponForm">
                    <div class="form-group"><label>Loja</label><input type="text" id="cpStore" placeholder="Ex: Shopee" required></div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div class="form-group"><label>Desconto</label><input type="text" id="cpValue" placeholder="Ex: 15%" required></div>
                        <div class="form-group"><label>Código</label><input type="text" id="cpCode" placeholder="VIPBR15" required></div>
                    </div>
                    <div class="form-group"><label>Descrição</label><input type="text" id="cpDesc" placeholder="Em compras acima de R$100"></div>
                    <button type="submit" class="btn-submit" style="background: #2ecc71">Salvar Cupom</button>
                </form>
                <div id="couponStatus" style="text-align:center; margin-top:10px;"></div>
                <div class="list-container" id="couponList" style="margin-top: 30px;">
                    <!-- Carregado via JS -->
                </div>
            </div>
        </div>

        <div class="footer-link">
            <a href="index.html">← Voltar para o site</a>
        </div>
    </div>

    <!-- MODAL EDITAR -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3>Editar Anúncio ✏️</h3>
            <form id="editForm">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label>Nome do Produto</label>
                    <input type="text" id="editName" required>
                </div>
                <div class="form-group">
                    <label>Preço</label>
                    <input type="text" id="editPrice" required>
                </div>
                <div class="form-group">
                    <label>Link de Afiliado</label>
                    <input type="text" id="editLink" required>
                </div>
                <div class="form-group">
                    <label>Nova Imagem (opcional)</label>
                    <input type="file" id="editImage" accept="image/*">
                </div>
                <div class="form-group">
                    <label>Categoria do Produto</label>
                    <div style="position: relative;">
                        <select id="editCategory" style="width: 100%; padding: 14px 18px; background: #000; border: 1.5px solid rgba(229,9,20,0.5); border-radius: 10px; color: #fff; font-family: var(--font-body); font-size: 16px; appearance: none; cursor: pointer; outline: none; transition: border-color 0.2s;">
                            <option value="Geral">📦 Geral (Padrão)</option>
                            <option value="Tecnologia">📱 Tecnologia / Celulares</option>
                            <option value="Moda">👗 Moda & Acessórios</option>
                            <option value="Casa">🏠 Casa & Cozinha</option>
                            <option value="Beleza">💄 Beleza & Saúde</option>
                            <option value="Alimentação">🍕 Alimentação / Supermercado</option>
                            <option value="Games">🎮 Games & PC Gamer</option>
                        </select>
                        <div style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); pointer-events: none; color: var(--red); font-weight: 900;">↓</div>
                    </div>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button type="submit" class="btn-submit" style="flex: 1">Salvar</button>
                    <button type="button" onclick="closeEditModal()" class="btn-submit" style="background: #444; flex: 1">Voltar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tabName).style.display = 'block';
            
            // Fix: the event might not be passed if called from script directly
            if (event) {
                event.target.classList.add('active');
            } else {
                // Fallback to find the button by text or similar
                document.querySelectorAll('.tab-btn').forEach(btn => {
                   if(btn.textContent.toLowerCase().includes(tabName.toLowerCase()) || 
                      (tabName === 'automation' && btn.textContent.includes('PDF'))) {
                       btn.classList.add('active');
                   }
                });
            }

            if (tabName === 'products') loadProducts();
            if (tabName === 'coupons') loadCoupons();
        }

        function updateFileName() {
            const input = document.getElementById('pdfFile');
            const fileName = document.getElementById('fileName');
            if (input.files[0]) fileName.textContent = "Selecionado: " + input.files[0].name;
        }

        // --- PDF ---
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fileInput = document.getElementById('pdfFile');
            const status = document.getElementById('status');
            const spinner = document.getElementById('spinner');
            if (!fileInput.files[0]) return alert('Selecione um arquivo.');

            const formData = new FormData();
            formData.append('pdf', fileInput.files[0]);
            formData.append('coupon', document.getElementById('globalCoupon').value);

            status.textContent = 'Processando...';
            spinner.style.display = 'block';

            try {
                const response = await fetch('/api/upload-pdf', { method: 'POST', body: formData });
                const result = await response.json();
                
                if (response.ok) {
                    status.textContent = 'Sucesso! ' + result.count + ' itens processados.';
                    status.style.color = '#2ecc71';
                    setTimeout(() => window.location.href = 'index.html', 2000);
                } else {
                    status.textContent = 'Erro: ' + (result.error || 'Falha no processamento');
                    console.error('Erro detalhado:', result);
                }
            } catch (error) { 
                status.textContent = 'Erro de rede: Servidor não responde.'; 
                status.style.color = '#e74c3c';
                console.error(error);
            }
            finally { spinner.style.display = 'none'; }
        });

        // --- SUPABASE CLIENT-SIDE ---
        let supabaseClient = null;
        async function initSupabase() {
            try {
                const res = await fetch('/api/config');
                const config = await res.json();
                supabaseClient = supabase.createClient(config.url, config.key);
            } catch (e) { console.error('Erro ao iniciar Supabase:', e); }
        }
        initSupabase();

        // --- PRODUTOS ---
        async function loadProducts() {
            const list = document.getElementById('productList');
            try {
                const res = await fetch('/api/promos');
                const data = await res.json();
                list.innerHTML = '';
                data.promos.forEach(p => {
                    const row = document.createElement('div');
                    row.className = 'item-row';
                    const safeName = p.name.replace(/'/g, "\\'");
                    const safePrice = (p.currentPrice || "").replace(/'/g, "\\'");
                    const safeLink = (p.affiliateLink || "").replace(/'/g, "\\'");

                    row.innerHTML = `
                        <div class="item-info">
                            <img src="${p.image}" class="item-thumb" onerror="this.src='assets/placeholder.png'">
                            <div class="item-text">
                                <strong>${p.name}</strong>
                                <small>${p.currentPrice}</small>
                                <span style="background: rgba(229,9,20,0.2); color: var(--red); padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; margin-left: 10px; border: 1px solid rgba(229,9,20,0.3); text-transform: uppercase;">${p.category || 'Geral'}</span>
                            </div>
                        </div>
                        <div class="btn-group">
                            <button class="btn-action btn-edit" onclick="openEditModal('${p.id}', '${safeName}', '${safePrice}', '${safeLink}', '${p.category || 'Geral'}')">Editar</button>
                            <button class="btn-action btn-delete" onclick="deleteProduct('${p.id}')">Excluir</button>
                        </div>
                    `;
                    list.appendChild(row);
                });
            } catch (e) { console.error(e); }
        }

        async function deleteProduct(id) {
            if (!confirm('Excluir este anúncio?')) return;
            await fetch(`/api/promos/${id}`, { method: 'DELETE' });
            loadProducts();
        }

        // --- EDITAR ---
        function openEditModal(id, name, price, link, category) {
            document.getElementById('editId').value = id;
            document.getElementById('editName').value = name;
            document.getElementById('editPrice').value = price;
            document.getElementById('editLink').value = link;
            document.getElementById('editCategory').value = category || 'Geral';
            document.getElementById('editModal').style.display = 'flex';
        }

        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        document.getElementById('editForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const statusBtn = e.target.querySelector('button[type="submit"]');
            statusBtn.textContent = 'Salvando...';
            statusBtn.disabled = true;

            try {
                let imageUrl = null;
                const imgFile = document.getElementById('editImage').files[0];
                
                if (imgFile && supabaseClient) {
                    const fileName = `direct_${Date.now()}_${imgFile.name}`;
                    const { data, error: uploadError } = await supabaseClient.storage
                        .from('promos')
                        .upload(fileName, imgFile, { upsert: true });
                    
                    if (!uploadError) {
                        const { data: urlData } = supabaseClient.storage.from('promos').getPublicUrl(fileName);
                        imageUrl = urlData.publicUrl;
                    }
                }

                const payload = {
                    name: document.getElementById('editName').value,
                    current_price: document.getElementById('editPrice').value,
                    affiliate_link: document.getElementById('editLink').value,
                    category: document.getElementById('editCategory').value
                };
                if (imageUrl) payload.image = imageUrl;

                await fetch(`/api/promos/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                closeEditModal();
                loadProducts();
            } catch (err) {
                console.error(err);
                alert('Erro ao salvar alterações.');
            } finally {
                statusBtn.textContent = 'Salvar Alterações';
                statusBtn.disabled = false;
            }
        });

        // --- CUPONS ---
        async function loadCoupons() {
            const list = document.getElementById('couponList');
            try {
                const res = await fetch('/api/coupons');
                const coupons = await res.json();
                list.innerHTML = '';
                coupons.forEach(c => {
                    const row = document.createElement('div');
                    row.className = 'item-row';
                    row.innerHTML = `
                        <div class="item-text">
                            <strong>${c.store}</strong>
                            <small>${c.code} (${c.value})</small><br>
                            <span style="font-size:12px; color:var(--gray)">${c.desc || ''}</span>
                        </div>
                        <button class="btn-action btn-delete" onclick="deleteCoupon('${c.id}')">Excluir</button>
                    `;
                    list.appendChild(row);
                });
            } catch (e) { console.error(e); }
        }

        document.getElementById('couponForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const coupon = {
                store: document.getElementById('cpStore').value,
                value: document.getElementById('cpValue').value,
                code: document.getElementById('cpCode').value,
                desc: document.getElementById('cpDesc').value
            };
            await fetch('/api/coupons', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(coupon)
            });
            document.getElementById('couponForm').reset();
            loadCoupons();
        });

        async function deleteCoupon(id) {
            if (!confirm('Excluir este cupom?')) return;
            await fetch(`/api/coupons/${id}`, { method: 'DELETE' });
            loadCoupons();
        }
    </script>
</body>
</html>
